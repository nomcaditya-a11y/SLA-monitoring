<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Create Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 p-10">

    <div class="max-w-xl mx-auto bg-slate-800 p-8 rounded-xl border border-slate-700 text-white shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-purple-400">⚙️ Create New Account</h2>
        
        <input type="email" id="newEmail" placeholder="User Email" class="w-full p-3 rounded bg-slate-700 mb-4 outline-none border border-slate-600">
        <input type="password" id="newPass" placeholder="Password (Min 6 chars)" class="w-full p-3 rounded bg-slate-700 mb-6 outline-none border border-slate-600">

        <div class="grid grid-cols-2 gap-4 mb-6 bg-slate-900 p-5 rounded border border-slate-700">
            <div>
                <h3 class="font-bold text-emerald-400 text-sm mb-3 border-b border-slate-700 pb-1">Dashboards Access</h3>
                <label class="flex items-center space-x-2 text-sm"><input type="checkbox" id="chk-sla" value="SLA" class="w-4 h-4 accent-emerald-500"><span>NOMC SLA</span></label>
                <label class="flex items-center space-x-2 text-sm mt-3"><input type="checkbox" id="chk-rcdc" value="RCDC" class="w-4 h-4 accent-emerald-500"><span>RCDC</span></label>
                <label class="flex items-center space-x-2 text-sm mt-3"><input type="checkbox" id="chk-dtloading" value="DT Loading Analysis" class="w-4 h-4 accent-emerald-500"><span>DT Loading Analysis</span></label>
            </div>
            <div>
                <h3 class="font-bold text-blue-400 text-sm mb-3 border-b border-slate-700 pb-1">Package Rights</h3>
                <label class="flex items-center space-x-2 text-sm"><input type="checkbox" id="chk-pkg1" value="PKG1" class="w-4 h-4 accent-blue-500"><span>PKG 1</span></label>
                <label class="flex items-center space-x-2 text-sm mt-3"><input type="checkbox" id="chk-pkg3" value="PKG3" class="w-4 h-4 accent-blue-500"><span>PKG 3</span></label>
            </div>
        </div>

        <button onclick="createUser()" id="createBtn" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded font-bold">Create Account</button>
        <p id="statusMsg" class="mt-4 text-center text-sm font-bold hidden"></p>
        <a href="portal.html" class="block text-center mt-6 text-slate-400 hover:text-white text-sm">← Back to Portal</a>
    </div>

    <script>
        const myRights = JSON.parse(sessionStorage.getItem("user_rights"));
        if (!myRights || myRights.role !== 'admin') window.location.href = "portal.html";

        const firebaseConfig = {
            apiKey: "AIzaSyAoe-gmqaS5mX10mVmwMl7sGhvtDT2Vrnc",
            authDomain: "nomc-8d3f0.firebaseapp.com",
            databaseURL: "https://nomc-8d3f0-default-rtdb.firebaseio.com",
            projectId: "nomc-8d3f0",
            storageBucket: "nomc-8d3f0.firebasestorage.app",
            messagingSenderId: "74946881929",
            appId: "1:74946881929:web:ef983a77e70fa916639958"
        };
        
        firebase.initializeApp(firebaseConfig);
        const secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary");
        const db = firebase.database();

        async function createUser() {
            const email = document.getElementById('newEmail').value.trim();
            const pass = document.getElementById('newPass').value;
            const status = document.getElementById('statusMsg');
            
            if(!email || pass.length < 6) { status.innerText = "❌ Invalid email/password."; status.className = "mt-4 text-center text-sm text-rose-500"; return; }

            const dashboards = [];
            if(document.getElementById('chk-sla').checked) dashboards.push('SLA');
            if(document.getElementById('chk-rcdc').checked) dashboards.push('RCDC');
            if(document.getElementById('chk-dtloading').checked) dashboards.push('DT Loading Analysis');
            
            const packages = [];
            if(document.getElementById('chk-pkg1').checked) packages.push('PKG1');
            if(document.getElementById('chk-pkg3').checked) packages.push('PKG3');

            try {
                await secondaryApp.auth().createUserWithEmailAndPassword(email, pass);
                const safeEmail = email.replace(/\./g, '_');
                
                await db.ref('users/' + safeEmail).set({
                    email: email, role: "user", dashboards: dashboards, packages: packages
                });
                
                status.innerText = `✅ Success! Account created for ${email}`;
                status.className = "mt-4 text-center text-sm font-bold text-emerald-500";
                secondaryApp.auth().signOut();
            } catch (error) { 
                status.innerText = `❌ Error: ${error.message}`;
                status.className = "mt-4 text-center text-sm font-bold text-rose-500";
            }
        }
    </script>
</body>
</html>
