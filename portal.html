<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genus Power | App Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen flex flex-col items-center justify-center">

    <h1 class="text-3xl font-bold text-white mb-8" id="welcomeText">Select Dashboard</h1>
    
    <div class="flex gap-6" id="dashboardContainer">
        <a href="index.html" id="btn-sla" class="hidden block w-64 bg-slate-800 p-6 rounded-xl border border-slate-700 hover:border-emerald-500 hover:shadow-emerald-500/20 hover:shadow-lg transition-all text-center group">
            <h2 class="text-xl font-bold text-emerald-500 mb-2">NOMC SLA</h2>
            <p class="text-xs text-slate-400">View SLA & Exclusions</p>
        </a>

       <a href="RCDC/index.html" 
   id="btn-rcdc" 
   class="hidden block w-64 bg-slate-800 p-6 rounded-xl border border-slate-700 hover:border-blue-500 hover:shadow-blue-500/20 hover:shadow-lg transition-all text-center group">
    <h2 class="text-xl font-bold text-blue-500 mb-2">RCDC CSPDCL</h2>
    <p class="text-xs text-slate-400">View Analytics</p>
</a>
    </div>

    <a href="admin.html" id="btn-admin" class="hidden mt-8 px-6 py-2 bg-purple-600 hover:bg-purple-500 text-white rounded-full text-sm font-bold transition">⚙️ Manage Users (Admin Only)</a>

    <button onclick="logout()" class="mt-8 text-slate-500 hover:text-rose-500 text-sm font-bold transition">Logout & Lock</button>

    <script>
        if (sessionStorage.getItem("genus_auth") !== "true") window.location.href = "index.html";

        const rights = JSON.parse(sessionStorage.getItem("user_rights"));
        document.getElementById('welcomeText').innerText = `Welcome, ${rights.role === 'admin' ? 'Administrator' : 'User'}`;

        // 🟢 MAGIC: Buttons show/hide based on Rights
        if (rights.role === 'admin' || rights.dashboards.includes('SLA')) document.getElementById('btn-sla').classList.remove('hidden');
        if (rights.role === 'admin' || rights.dashboards.includes('RCDC')) document.getElementById('btn-rcdc').classList.remove('hidden');
        if (rights.role === 'admin') document.getElementById('btn-admin').classList.remove('hidden');

        function logout() {
            sessionStorage.clear();
            window.location.href = "login.html";
        }
        function logout() {
        // Sabse pehle session saaf karo
        sessionStorage.clear(); 
        // Phir user ko bahar phenk do
        window.location.href = "login.html";
    }
    </script>
    <script>
    // 1. Storage se user ka data nikalo
    const userData = JSON.parse(sessionStorage.getItem("user_rights") || "{}");

    // 2. Agar data mil gaya, toh HTML mein naam badal do
    if (userData && userData.email) {
        // Email se naam nikalne ke liye (e.g. aditya.raut@gmail.com -> Aditya Raut)
        // Agar tumne database mein 'name' field banayi hai toh seedha userData.name use karo
        const rawName = userData.email.split('@')[0].replace(/\./g, ' '); 
        
        // Pehla letter Capital karne ke liye logic
        const formattedName = rawName.replace(/\b\w/g, l => l.toUpperCase());

        document.getElementById('userName').innerText = formattedName;
        
        // Agar role bhi dynamic dikhana hai (Admin/User)
        document.getElementById('userRole').innerText = userData.role === 'admin' ? 'Master Admin' : 'NOMC Engineer';
    }
</script>
</body>
</html>
