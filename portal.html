<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genus Power | App Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // System default se light/dark automatically uthayega
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 h-screen flex flex-col items-center justify-center transition-colors duration-300">
    
    <div class="flex items-center shrink-0 mb-8">
        <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-center">
            <img src="/RCDC/js/logo.webp" alt="Genus Logo" class="h-16 sm:h-20 w-auto object-contain shrink-0">
        </div>
    </div>            
        
    <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-8 transition-colors duration-300" id="welcomeText">Select Dashboard</h1>
    
    <div class="flex gap-6" id="dashboardContainer">
        <a href="index.html" id="btn-sla" class="hidden block w-64 bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-emerald-500 hover:shadow-emerald-500/20 hover:shadow-lg transition-all text-center group">
            <h2 class="text-xl font-bold text-emerald-600 dark:text-emerald-500 mb-2">NOMC SLA</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400">View SLA & Exclusions</p>
        </a>

        <a href="RCDC/index.html" id="btn-rcdc" class="hidden block w-64 bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-blue-500 hover:shadow-blue-500/20 hover:shadow-lg transition-all text-center group">
            <h2 class="text-xl font-bold text-blue-600 dark:text-blue-500 mb-2">RCDC CSPDCL</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400">View Analytics</p>
        </a>
    </div>

    <a href="admin.html" id="btn-admin" class="hidden mt-8 px-6 py-2 bg-purple-600 hover:bg-purple-500 text-white rounded-full text-sm font-bold shadow-md transition">⚙️ Manage Users (Admin Only)</a>

    <button onclick="logout()" class="mt-8 text-slate-500 dark:text-slate-400 hover:text-rose-600 dark:hover:text-rose-500 text-sm font-bold transition">Logout & Lock</button>

    <script>
        // 1. Security Check: Login hai ya nahi?
        const authStatus = sessionStorage.getItem("genus_auth");
        const storedRights = sessionStorage.getItem("user_rights");

        if (authStatus !== "true" || !storedRights) {
            window.location.href = "index.html";
        } else {
            // 2. Data nikalo
            const rights = JSON.parse(storedRights);

            // 3. Welcome Text update karo
            const welcomeElem = document.getElementById('welcomeText');
            if (welcomeElem) {
                welcomeElem.innerText = `Welcome, ${rights.role === 'admin' ? 'Administrator' : 'User'}`;
            }

            // 4. Buttons show/hide (Rights Logic)
            if (rights.role === 'admin' || (rights.dashboards && rights.dashboards.includes('SLA'))) {
                document.getElementById('btn-sla')?.classList.remove('hidden');
            }
            if (rights.role === 'admin' || (rights.dashboards && rights.dashboards.includes('RCDC'))) {
                document.getElementById('btn-rcdc')?.classList.remove('hidden');
            }
            if (rights.role === 'admin') {
                document.getElementById('btn-admin')?.classList.remove('hidden');
            }

            // 5. User Name & Role Display (Dynamic)
            if (rights.email) {
                const rawName = rights.email.split('@')[0].replace(/[\._]/g, ' ');
                const formattedName = rawName.replace(/\b\w/g, l => l.toUpperCase());

                const nameElem = document.getElementById('userName');
                const roleElem = document.getElementById('userRole');

                if (nameElem) nameElem.innerText = formattedName;
                if (roleElem) roleElem.innerText = rights.role === 'admin' ? 'Master Admin' : 'NOMC Engineer';
            }
        }

        // 6. Logout Function
        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
