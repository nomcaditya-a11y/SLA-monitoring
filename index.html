<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    // Agar pehle se login hai, toh login page skip karo
    if (sessionStorage.getItem("genus_auth") === "true") {
        window.location.href = "portal.html";
    }
</script>
    <meta charset="UTF-8">
    <title>Genus Power | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center">

    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-96 border border-slate-700">
        <h2 class="text-2xl font-bold text-white mb-2 text-center">Genus Portal</h2>
        <p class="text-slate-400 text-sm text-center mb-6">Login to access authorized dashboards</p>
        
        <input type="email" id="emailInput" placeholder="Email Address" class="w-full p-3 rounded bg-slate-700 text-white border border-slate-600 mb-4 focus:border-emerald-500 outline-none">
        <input type="password" id="passInput" placeholder="Password" class="w-full p-3 rounded bg-slate-700 text-white border border-slate-600 mb-4 focus:border-emerald-500 outline-none">
        
        <p id="errorMsg" class="text-rose-500 text-xs font-bold mb-4 hidden"></p>
        <button onclick="checkLogin()" id="loginBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded transition-all">Secure Login</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAoe-gmqaS5mX10mVmwMl7sGhvtDT2Vrnc",
            authDomain: "nomc-8d3f0.firebaseapp.com",
            databaseURL: "https://nomc-8d3f0-default-rtdb.firebaseio.com",
            projectId: "nomc-8d3f0",
            storageBucket: "nomc-8d3f0.firebasestorage.app",
            messagingSenderId: "74946881929",
            appId: "1:74946881929:web:ef983a77e70fa916639958"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database(); // Changed to RTDB

        async function checkLogin() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            
            if(!email || !pass) { err.innerText = "Please enter credentials"; err.classList.remove('hidden'); return; }

            btn.innerText = "Verifying..."; err.classList.add('hidden');

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // Safe Email (Replace dots with underscore for RTDB)
                const safeEmail = user.email.replace(/\./g, '_');
                const snapshot = await db.ref('users/' + safeEmail).once('value');
                
                if (snapshot.exists()) {
                    const rights = snapshot.val();
                    sessionStorage.setItem("genus_auth", "true");
                    sessionStorage.setItem("user_rights", JSON.stringify(rights));
                    window.location.href = "portal.html"; 
                } else {
                    err.innerText = "No access rights found. Contact Admin.";
                    err.classList.remove('hidden');
                    auth.signOut();
                }
            } catch (error) {
                err.innerText = "Invalid Email or Password!";
                err.classList.remove('hidden');
            }
            btn.innerText = "Secure Login";
        }
        document.getElementById('passInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkLogin(); });
    </script>
</body>
</html>
